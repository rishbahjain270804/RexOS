# RexOS — Hyprland configuration
# A clean, modern, animated Wayland desktop. Mouse + keyboard fully supported.

source = ~/.config/hypr/colors.conf

# ---- monitors ----
monitor = ,preferred,auto,1

# ---- autostart ----
exec-once = waybar &
exec-once = swww-daemon &                 # wallpaper daemon (static + transitions)
exec-once = ~/.local/bin/rexos-wallpaper restore &   # reapply last wallpaper (static/live)
exec-once = swaync &                      # notifications
exec-once = wl-paste --watch cliphist store &

# ---- environment ----
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland

# ---- input (keyboard + mouse) ----
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ---- look & feel ----
general {
    gaps_in = $gap
    gaps_out = 16
    border_size = $border
    col.active_border = rgb(14b8c4) rgb(3ad4de) 45deg   # RexOS teal gradient border
    col.inactive_border = rgb(2a3148)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = $radius
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
    drop_shadow = true
    shadow_range = 18
    shadow_render_power = 3
    col.shadow = rgba(0f1117cc)
    active_opacity = 1.0
    inactive_opacity = 0.96
}

# smooth, modern animations
animations {
    enabled = true
    bezier = rex, 0.16, 1, 0.3, 1
    animation = windows, 1, 5, rex
    animation = windowsOut, 1, 5, rex, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 6, default
    animation = workspaces, 1, 5, rex, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# ---- keybinds ----
$mod = SUPER

bind = $mod, Return, exec, ghostty        # terminal
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, E, exec, yazi                 # file manager
bind = $mod, R, exec, rofi -show drun      # app launcher
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, B, exec, firefox              # browser
bind = $mod, W, exec, ~/.local/bin/rexos-wallpaper menu   # wallpaper picker (static + live)

# move focus with mod + arrows
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# workspaces 1-9
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3

# mouse: drag windows with mod + click
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
