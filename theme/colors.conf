# RexOS design system — the single source of truth for the look.
# Every config (Hyprland, waybar, rofi, sddm) pulls from these values.

# ---- core palette ----
# Deep, modern, minimal. Teal accent on indigo, like the RexOS graphics build.

# backgrounds (darkest -> lighter)
$bg0   = 0x0f1117      # near-black base
$bg1   = 0x161a26      # panels
$bg2   = 0x1e2436      # raised surfaces
$bg3   = 0x2a3148      # borders / dividers

# foregrounds
$fg0   = 0xe8eaf0      # primary text
$fg1   = 0xb8bdcc      # secondary text
$fg2   = 0x6b7280      # muted / disabled

# the RexOS accent (signature teal/cyan)
$accent      = 0x14b8c4
$accent_dim  = 0x0e8a93
$accent_glow = 0x3ad4de

# status colors
$green  = 0x4ade80
$yellow = 0xfacc15
$red    = 0xf87171
$blue   = 0x60a5fa
$violet = 0xa78bfa

# gradient for the wallpaper / accents (indigo -> violet)
$grad_a = 0x1e2148
$grad_b = 0x3a2160

# ---- typography ----
$font        = JetBrainsMono Nerd Font
$font_ui     = Inter
$font_size   = 11

# ---- spacing / shape ----
$radius      = 10
$gap         = 8
$border      = 2
